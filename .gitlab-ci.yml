# Converted from GitHub Actions — incus-image-server
# Mirrors: build-and-publish.yml, server-ci.yml, demo-server-ci.yml,
#          chromiumos-stage3-build.yml

stages:
  - secret-scan
  - test
  - build
  - publish

default:
  image: ubuntu:22.04

# ── Server CI (Elixir/Phoenix) ────────────────────────────────────────────────
server:deps:
  stage: test
  image: alpine:3.19
  before_script:
    - apk update && apk add --update tar build-base libsodium-dev elixir nodejs npm git erlang-dialyzer
  cache:
    key:
      files: [unified-image-server/server/mix.lock]
    paths:
      - unified-image-server/server/deps/
      - unified-image-server/server/_build/
      - unified-image-server/server/priv/plts/
  script:
    - cd unified-image-server/server
    - mkdir -p priv/plts
    - mix local.rebar --force
    - mix local.hex --force
    - mix deps.get
    - mix deps.compile
    - MIX_ENV=test mix deps.compile
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [unified-image-server/server/**/*]
    - if: '$CI_COMMIT_BRANCH =~ /^(main|develop|feature\/.+|hotfix\/.+)$/'
      changes: [unified-image-server/server/**/*]

server:format:
  stage: test
  image: alpine:3.19
  needs: [server:deps]
  before_script:
    - apk update && apk add --update tar build-base libsodium-dev elixir nodejs npm git erlang-dialyzer
    - cd unified-image-server/server && mix local.rebar --force && mix local.hex --force && mix deps.get
  script:
    - cd unified-image-server/server && mix format --check-formatted
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [unified-image-server/server/**/*]
    - if: '$CI_COMMIT_BRANCH =~ /^(main|develop)$/'
      changes: [unified-image-server/server/**/*]

server:test:
  stage: test
  image: alpine:3.19
  needs: [server:deps]
  services:
    - name: postgres:15
      alias: postgres
  variables:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: postgres
    POSTGRES_HOST: postgres
    POSTGRES_USERNAME: postgres
    POSTGRES_PORT: "5432"
    DEFAULT_CDN_HOST: some.domain.com
    STORAGE_ADAPTER: local
    STORAGE_BASE_PATH: /tmp/polar-test-storage
  before_script:
    - apk update && apk add --update tar build-base libsodium-dev elixir nodejs npm git erlang-dialyzer
    - cd unified-image-server/server && mix local.rebar --force && mix local.hex --force && mix deps.get
  script:
    - cd unified-image-server/server && mix test --trace --slowest 10
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [unified-image-server/server/**/*]
    - if: '$CI_COMMIT_BRANCH =~ /^(main|develop)$/'
      changes: [unified-image-server/server/**/*]

# ── Build distro images (scheduled / manual / manifest push) ─────────────────
.build-image-base:
  stage: build
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends
        ca-certificates debootstrap squashfs-tools gpg curl xz-utils golang-go
    - go install github.com/lxc/distrobuilder/distrobuilder@latest
    - export PATH="$HOME/go/bin:$PATH"
  artifacts:
    paths: [/tmp/image-output/]
    expire_in: 1 day

build-image:ubuntu-amd64:
  extends: .build-image-base
  script:
    - mkdir -p /tmp/image-output
    - distrobuilder build-incus unified-image-server/manifests/ubuntu.yml
        -o image.architecture=amd64 --type unified /tmp/image-output || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: [unified-image-server/manifests/**/*]
    - when: manual
      allow_failure: true

build-image:debian-amd64:
  extends: .build-image-base
  script:
    - mkdir -p /tmp/image-output
    - distrobuilder build-incus unified-image-server/manifests/debian.yml
        -o image.architecture=amd64 --type unified /tmp/image-output || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: manual
      allow_failure: true

build-image:alpine-amd64:
  extends: .build-image-base
  script:
    - mkdir -p /tmp/image-output
    - distrobuilder build-incus unified-image-server/manifests/alpine.yml
        -o image.architecture=amd64 --type unified /tmp/image-output || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: manual
      allow_failure: true

# ── Publish images as GitLab Release ─────────────────────────────────────────
publish-images:
  stage: publish
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: [build-image:ubuntu-amd64]
  environment:
    name: production
  script:
    - echo "Publishing image release images-$(date +%Y%m%d)"
  release:
    tag_name: 'images-$CI_PIPELINE_CREATED_AT'
    description: 'Automated image build'
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

# ── Always-on lint (validates manifests on every push) ────────────────────────
lint:
  stage: test
  image: python:3.12-alpine
  before_script:
    - pip install pyyaml -q
  script:
    - |
      failed=0
      for f in $(find unified-image-server/manifests -name "*.yml" -o -name "*.yaml" 2>/dev/null); do
        python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" \
          && echo "OK:   $f" \
          || { echo "FAIL: $f"; failed=1; }
      done
      exit $failed
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|develop)$/'

secret-scan:
  stage: secret-scan
  image: python:3.12-slim
  before_script:
    - pip install git-filter-repo --quiet
  script:
    - |
      echo "Scanning commit history for leaked GitLab PATs..."
      git log --all -p | grep -E "glpat-[A-Za-z0-9_-]{20,}" && echo "LEAKED TOKEN DETECTED" && exit 1 || echo "No leaked tokens found."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master)$/'
